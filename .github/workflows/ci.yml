name: CI Pipeline
on:
  push:
    branches: [ "main", "integration" ]
  pull_request:
    branches: [ "main", "integration" ]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Run Linter
        run: ./gradlew ktlintCheck
      - name: Build Project
        run: ./gradlew build
      - name: Run Tests
        run: ./gradlew test
