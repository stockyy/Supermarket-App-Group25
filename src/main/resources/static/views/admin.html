<html>
<head>
    <title>Supermarket API Admin</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .card { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        input[type="number"] { width: 80px; padding: 5px; }
        button { padding: 6px 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        button:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        a { text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
    <script>
        function testOffsale() {
            let id = document.getElementById('off-id').value || 1;
            let pot = document.getElementById('off-pot').checked;
            let rev = document.getElementById('off-rev').checked;
            window.location.href = `/offsale/${'$'}{id}?potential=${'$'}{pot}&reviewed=${'$'}{rev}`;
        }
        function testWastage() {
            let id = document.getElementById('waste-id').value || 1;
            let qty = document.getElementById('waste-qty').value || 1;
            window.location.href = `/wastage/${'$'}{id}?qty=${'$'}{qty}`;
        }

        async function testStock() {
            let id = document.getElementById('stock-id').value || 1;
            let qty = document.getElementById('stock-qty').value || 0;

            const response = await fetch(`/update-stock/${'$'}{id}?qty=${'$'}{qty}`, { method: 'PUT' });
            const text = await response.text();
            alert(text);
        }

        async function seedFromJson() {
            if(confirm("Are you sure you want to WIPE and re-seed the database from the JSON file?")) {
                const response = await fetch('/seed-db', { method: 'PUT' });
                const text = await response.text();
                alert(text);
            }
        }

        async function seedWithRandom() {
            if(confirm("Are you sure you want to WIPE and re-seed the database with random data?")) {
                const response = await fetch('/seed-db-random', { method: 'PUT' });
                const text = await response.text();
                alert(text);
            }
        }

        function loadIntoViewer(url) {
            document.getElementById('result-viewer').src = url;
            document.getElementById('viewer-container').style.display = 'block';
        }

        function clearViewer() {
            document.getElementById('result-viewer').src = 'about:blank';
            document.getElementById('viewer-container').style.display = 'none';
        }
    </script>
</head>
<body>
<h2>Admin Quick Links</h2>
<div class="card">
    <button onclick="loadIntoViewer('/view-all-products')">🖼️ Products (Photos)</button>
    <button onclick="loadIntoViewer('/print-all-products')">📦 Products (Text)</button>
    <button onclick="loadIntoViewer('/print-all-users')">👥 All Users</button>
    <button onclick="loadIntoViewer('/print-all-workers')">👷 Staff Only</button>
    <button onclick="loadIntoViewer('/print-all-orders')">🛍️ All Orders</button>
    <button onclick="loadIntoViewer('/print-all-carts')">🛒 All Carts</button>
    <button onclick="loadIntoViewer('/print-all-picklists')">📋 All Picklists</button>
    <button onclick="loadIntoViewer('/print-offsale-logs')">📜 Offsale Logs</button>
    <button onclick="loadIntoViewer('/print-wastage-logs')">🗑️ Wastage Logs</button>
</div>

<div id="viewer-container" class="card" style="display:none; max-width: 100%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <b>Results Viewer</b>
        <button onclick="clearViewer()" class="btn-danger">Close Viewer</button>
    </div>
    <iframe id="result-viewer" style="width: 100%; height: 500px; border: 1px solid #ccc; background: white;"></iframe>
</div>

<h2>Interactive Testers</h2>

<div class="card">
    <b>📋 Picklist Generation</b><br/>
    <button onclick="loadIntoViewer('/generate-default-picklists')">Run Default Picklist Generation</button>
</div>

<div class="card">
    <b>⚠️ Test Offsale Route</b><br/>
    Product ID: <input type="number" id="off-id" value="1"/>
    <label><input type="checkbox" id="off-pot"> Potential?</label>
    <label><input type="checkbox" id="off-rev"> Reviewed?</label>
    <button onclick="testOffsale()">Run Offsale Test</button>
</div>

<div class="card">
    <b>🗑️ Test Wastage Route</b><br/>
    Product ID: <input type="number" id="waste-id" value="1"/>
    Quantity: <input type="number" id="waste-qty" value="1"/>
    <button onclick="testWastage()">Run Wastage Test</button>
</div>

<div class="card">
    <b>📦 Change Stock Level</b><br/>
    Product ID: <input type="number" id="stock-id" value="1"/>
    New Stock Level: <input type="number" id="stock-qty" value="50"/>
    <button onclick="testStock()">Update Stock</button>
</div>

<div class="card">
    <b>🔄 Database Management</b><br/><br/>
    <button class="btn-danger" onclick="seedFromJson()">Wipe & Seed from JSON</button>
</div>
</body>
</html>
