<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/basket.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Your Basket</title>
</head>
<body>
<header class="header-container">
    <div id="nav-placeholder"></div>
</header>

<main class="basket-container">
    <h1 class="basket-page-heading">Your Basket</h1>

    <p id="basket-status" class="basket-status">Loading your basket...</p>

    <div class="basket-page-content" id="basket-page-content" style="display:none;">

        <div class="basket-items" id="basket-items">
        </div>

        <div class="basket-summary-container">
            <h2>Order Summary</h2>

            <div class="basket-item-container">
                <span id="basket-summary-label">Subtotal</span>
                <span id="basket-subtotal">£0.00</span>
            </div>

            <div class="basket-item-container">
                <span>Delivery</span>
                <span id="basket-delivery">£0.00</span>
            </div>

            <div class="basket-item-container total-row">
                <strong>Total</strong>
                <strong id="basket-total">£0.00</strong>
            </div>

            <button id="checkout-button" onclick="location.href='/customers/checkout'" aria-label="Proceed to checkout">
                Proceed to Checkout
            </button>
        </div>

    </div>

    <div class="basket-empty" id="basket-empty" style="display:none;">
        <span style="font-size:64px;">🛒</span>
        <h2>Your basket is empty</h2>
        <p>Looks like you haven't added anything yet. <a href="/customers/products-listing">Browse products</a> to get started.</p>
    </div>

</main>

<div id="footer-placeholder" class="footer-placeholder"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/customer-auth-guard.js"></script>
<script src="/static/js/nav-bar.js"></script>
<script src="/static/js/basket-count.js"></script>
<script src="/static/js/basket-aside.js"></script>
<script src="/static/js/basket-page.js"></script>
<script>
    fetch('/static/views/partials/nav-bar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            initBasket();
            refreshBasketCount();
            refreshBasketAside();
        })
        .catch(err => console.error('nav failed to load:', err));

    fetch('/static/views/partials/footer.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('footer-placeholder').innerHTML = html;
        })
        .catch(err => console.error('footer failed to load:', err));

    // Load the basket page contents on page load
    window.addEventListener('DOMContentLoaded', function() {
        refreshBasketPage();
    });
</script>

</body>
</html>
