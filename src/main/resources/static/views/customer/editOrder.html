<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/editOrder.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Edit Order</title>
</head>
<body>
<header class="header-container">
    <div id="nav-placeholder"></div>
</header>

<main class="edit-order-page">
    <h1>Edit Order</h1>

    <div class="current-order-container">
        <div class="order-field">
            <label>Order ID</label>
            <span>#1121212</span>
        </div>
        <div class="order-field">
            <label>Status</label>
            <span class="order-status order-status-waiting">Waiting</span>
        </div>
        <div class="order-field">
            <label>Delivery Date</label>
            <span>Fri 1 May</span>
        </div>
        <div class="order-field">
            <label>Price</label>
            <span>£67.67</span>
        </div>
    </div>

    <div class="change-order-container">
        <h2 class="change-order-heading">Update Order Details</h2>
        <p class="change-order-subtitle">Changes can be made until your order is picked.</p>

        <form action="/customers/orders/update" method="post">
            <div class="form-row">
                <div class="form-field">
                    <label for="edit-order-id">Order ID</label>
                    <input type="text" id="edit-order-id" name="order_id" value="#1121212" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-field">
                    <label for="edit-delivery-slot">Delivery Slot</label>
                    <select id="edit-delivery-slot" name="delivery_slot" required>
                        <option value="">Select a delivery slot</option>
                        <option value="2026-05-01-08-10">Fri 1 May, 8 – 10 AM</option>
                        <option value="2026-05-01-10-12">Fri 1 May, 10 AM – 12 PM</option>
                        <option value="2026-05-01-12-14" selected>Fri 1 May, 12 – 2 PM</option>
                        <option value="2026-05-01-14-16">Fri 1 May, 2 – 4 PM</option>
                        <option value="2026-05-01-18-20">Fri 1 May, 6 – 8 PM</option>
                        <option value="2026-05-02-08-10">Sat 2 May, 8 – 10 AM</option>
                        <option value="2026-05-02-10-12">Sat 2 May, 10 AM – 12 PM</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-field">
                    <label for="edit-delivery-address">Delivery Address</label>
                    <input type="text" id="edit-delivery-address" name="delivery_address">
                </div>
            </div>


            <div class="form-actions">
                <button type="button" class="btn-cancel-order" aria-label="Cancel Order">Cancel Order</button>
                <button type="submit" class="btn-save-changes" aria-label="Save Changes">Save Changes</button>
            </div>
        </form>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/customer-auth-guard.js"></script>
<script src="/static/js/nav-bar.js"></script>
<script src="/static/js/searchFilter.js"></script>
<script>
    fetch('/static/views/partials/nav-bar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            initBasket();
        })
        .catch(err => console.error('nav failed to load:', err));

    fetch('/static/views/partials/footer.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('footer-placeholder').innerHTML = html;
            initBasket();
        })
        .catch(err => console.error('footer failed to load:', err));

    fetch('/static/views/partials/searchFilter.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('searchFilter-placeholder').innerHTML = html;
            initSearchFilter();
        })
        .catch(err => console.error('footer failed to load:', err));
</script>
</body>
</html>
