<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/layout.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Forgot Password</title>
</head>
<body>
<main id="forgot-view" class="auth-view visible">
    <div class="auth-wrap">
        <section class="auth-form-panel" aria-label="Reset password form">
            <div class="auth-form-wrap">

                <div class="auth-header">
                    <p class="auth-eyebrow">Account recovery</p>
                    <h1>Reset your password</h1>
                    <p>Enter the email address linked to your 2850Mart account and we'll send you a reset link.</p>
                </div>

                <form
                        id="forgot-form"
                        action="/customers/password-reset"
                        method="post"
                        novalidate
                        aria-label="Password reset"
                >
                    <div class="fields">

                        <div class="field">
                            <label for="forgot-email">
                                Email address <span class="req" aria-label="required">*</span>
                            </label>
                            <input
                                    type="email"
                                    id="forgot-email"
                                    name="email"
                                    class="f-input"
                                    autocomplete="email"
                                    required
                                    aria-required="true"
                                    aria-describedby="err-forgot-email"
                                    placeholder="you@example.com"
                            >
                            <span id="err-forgot-email" class="f-err" role="alert" aria-live="polite"></span>
                        </div>

                        <button type="submit" class="btn btn-primary" id="forgot-submit">
                            Send Reset Link
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z"/></svg>
                        </button>

                    </div>
                </form>

                <div class="auth-footer">
                    <p>
                        <a href="/customers/login">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            Back to Sign In
                        </a>
                    </p>
                </div>

            </div>
        </section>
    </div>
</main>
</body>
</html>
