<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/components.css">
    <link rel="stylesheet" href="/static/stylesheets/layout.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Forgot Password Email</title>
</head>
<body>
<div id="forgot-sent-view" class="auth-view visible">
    <div class="auth-wrap visible">
        <section class="auth-form-panel" aria-label="Password reset confirmation">
            <div class="auth-form-wrap">

                <!-- Announced to SR when view becomes visible -->
                <div role="status" aria-live="polite" aria-atomic="true" aria-label="Password reset email sent confirmation">

                    <div class="sent-card">
                        <div class="sent-icon" aria-hidden="true">✉️</div>
                        <h1 style="font-size:var(--t-xl);">Check your inbox</h1>
                        <p>
                            We've sent a password reset link
                            <span class="sent-email" id="sent-email-display">sarah@example.com</span>.
                            Follow the link in the email to choose a new password.
                        </p>
                        <p style="font-size:var(--t-xs);color:var(--clr-text-s);">
                            Didn't receive it? Check your spam folder.
                            <a style="color: var(--clr-accent); text-decoration: underline" href="/customers/forgotPassword">Try another email.</a>
                        </p>
                    </div>

                </div>

                <div class="auth-footer" style="margin-top:var(--sp-6);">
                    <p>
                        <a href="/customers/login"  style="display:inline-flex;align-items:center;gap:6px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            Back to Sign In
                        </a>
                    </p>
                </div>

            </div>
        </section>
    </div>
</div>
</body>
</html>
