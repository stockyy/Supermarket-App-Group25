<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Customer Landing</title>
</head>
<body>
    <header>
        <div class="search-bar">
            <form action="/products/search" method="get" role="search" aria-label="Search products">
                <label for="search-input" class="sr-only">Search for products</label>
                <input type="search" id="search-input" name="q" placeholder="Search products…" autocomplete="off">
                <button type="submit">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    Search
                </button>
            </form>
        </div>

        <nav class="header-btns" aria-label="Account and basket">
            <a href="/views/customer/login.html" class="hdr-btn" aria-label="My account">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Account
            </a>
            <button class="hdr-btn" id="basket-toggle-btn" aria-label="Open basket, 3 items" aria-expanded="false" aria-controls="basket-drawer">
        <span style="position:relative;display:inline-flex;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="basket-count" id="basket-count" aria-hidden="true">3</span>
        </span>
                Basket
            </button>
        </nav>
    </header>

    
</body>
</html>
