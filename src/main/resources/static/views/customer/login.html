<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/layout.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
<div id="login-view" class="auth-view visible" role="main">
    <div class="auth-wrap">
        <section class="auth-form-panel">
            <div class="auth-form-wrap">
                <main id="auth-main" tabindex="-1">
                    <a href="/customers/landing" class="auth-back-link" aria-label="Back to customer landing page">
                        <span aria-hidden="true">&larr;</span>
                        Back to store
                    </a>

                    <div class="auth-header">
                        <p class="auth-welcome-msg">Welcome back</p>
                        <h1>Sign in to your account</h1>
                        <p class="auth-header-register">Don't have an account? <a href="/customers/register">Create one</a></p>
                    </div>

                    <form id="login-form" action="/customers/login" method="post" novalidate>
                        <div id="login-error-banner" class="form-error-banner" role="alert" aria-live="assertive" hidden>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <span id="login-error-msg">Your email or password is incorrect. Please try again.</span>
                        </div>

                        <div class="fields">
                            <div class="field">
                                <label for="login-email">Email address <span class="req">*</span></label>
                                <input type="email" id="login-email" name="email" class="f-input" autocomplete="email" required placeholder="Email">
                                <span id="login-email-err" class="f-err" role="alert" aria-live="polite"></span>
                            </div>

                            <div class="field">
                                <label for="login-password">Password <span class="req">*</span></label>
                                <div class="pass-wrap">
                                    <input type="password" id="login-password" name="password" class="f-input" autocomplete="current-password" required placeholder="Password">
                                    <button type="button" class="pass-toggle" aria-label="Toggle password visibility" data-target="login-password">
                                        <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                        <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    </button>
                                </div>
                                <span id="login-pass-err" class="f-err" role="alert" aria-live="polite"></span>
                            </div>

                            <div class="remember-row">
                                <label class="remember-check">
                                    <input type="checkbox" name="remember" id="login-remember">
                                    Remember me
                                </label>
                                <a href="/customers/forgotPassword" class="forgot-link" aria-label="Forgot password?">Forgot password?</a>
                            </div>

                            <div class="staff-link-row" style="margin-top: 20px; text-align: center;">
                                <a href="/management/login" style="font-size: 0.85rem; color: #666;" aria-label="Go to employee portal">Employee Portal</a>
                            </div>

                            <button type="submit" class="btn btn-primary" id="login-submit" aria-label="Sign in to your account">
                                Sign In
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </form>

                    <div class="auth-footer">
                        <p>New to 2850Mart? <a href="/customers/register">Create an account</a></p>
                    </div>
                </main>
            </div>
        </section>
    </div>
</div>

<script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const banner = document.getElementById('login-error-banner');
        const msg = document.getElementById('login-error-msg');

        if (params.get('error') === 'invalid_credentials') {
            banner.removeAttribute('hidden');
        } else if (params.get('error') === 'missing_fields') {
            banner.removeAttribute('hidden');
            msg.innerText = "Please enter both your email and password.";
        } else if (params.get('registered') === 'true') {
            banner.removeAttribute('hidden');
            banner.style.backgroundColor = "#e6f4ea";
            banner.style.color = "#137333";
            banner.querySelector('svg').style.display = 'none';
            msg.innerText = "Account created! Please sign in.";
        }
    };
</script>
</body>
</html>
