<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/orderHistory.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Order History</title>
</head>
<body>
    <header class="header-container">
        <div id="nav-placeholder"></div>
    </header>

    <main>
        <h1>Order History</h1>
        <p id="order-history-status" class="order-history-status">Loading your orders...</p>
        <div class="order-cards-container" id="order-cards-container"></div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/customer-auth-guard.js"></script>
    <script src="/static/js/nav-bar.js"></script>
    <script src="/static/js/basket-count.js"></script>
    <script src="/static/js/basket-aside.js"></script>
    <script src="/static/js/order-history.js"></script>
    <script>
        fetch('/static/views/partials/nav-bar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
                refreshBasketCount();
                refreshBasketAside();
            })
            .catch(err => console.error('nav failed to load:', err));

        fetch('/static/views/partials/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('footer failed to load:', err));
    </script>
</body>
</html>
