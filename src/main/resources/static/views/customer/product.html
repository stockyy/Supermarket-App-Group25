    <header>
        <h1>Shop Products</h1>
        <div class="search-fil-container">
            <div class="search-container">
                <input type="text" id="search-bar" name="search-bar">
                <button class="search-btn">Search</button>
            </div>

            <div class="filter-container">
                <label for="sort">Sort by:</label>
                <select id="sort">
                    <option value="default">Popular</option>
                    <option value="price-low">Low to High</option>
                    <option value="price-high">High to Low</option>
                </select>
            </div>
        </div>
        <div class="filter-panel">
        <h3>Categories</h3>

        <ul class="category-list">
            <li><button data-category="all">All</button></li>
            <li><button data-category="fruit">Fruit</button></li>
            <li><button data-category="vegetables">Vegetables</button></li>
            <li><button data-category="dairy">Dairy</button></li>
            <li><button data-category="meat">Meat</button></li>
            <li><button data-category="bakery">Bakery</button></li>
