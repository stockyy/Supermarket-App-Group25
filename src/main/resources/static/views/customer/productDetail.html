<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/productDetail.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Product Detail</title>
</head>
<body>
    <header class="header-container">
        <div id="nav-placeholder"></div>
        <div id="searchFilter-placeholder"></div>
    </header>

    <main class="product-detail">
        <div class="product-img">
            <img src="" alt="Product Image" class="main-img">
        </div>

        <div class="product-content">
            <span class="cat-tag">Category Name</span>
            <h2 class="item-title">Product Name</h2>

            <div class="price-group">
                <span class="price-big">£0.00</span>
                <span class="unit-label">per item</span>
                <span class="promo-badge">On Offer</span>
            </div>

            <div class="availability">
                <span class="stock-indicator stock-in">In Stock</span>
            </div>

            <p class="item-desc">
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ad consectetur consequatur consequuntur ducimus facere harum nobis placeat quaerat.
            </p>

            <div class="buy-actions">
                <div class="qty-stepper">
                    <button type="button" data-action="dec" aria-label="Decrease quantity">−</button>
                    <input type="number" value="1" min="1" aria-label="Quantity">
                    <button type="button" data-action="inc" aria-label="Increase quantity">+</button>
                </div>
                <button class="btn-add-main">Add to Basket</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder" class="footer-placeholder"></div>

    <script src="/static/js/nav-bar.js"></script>
    <script src="/static/js/searchFilter.js"></script>
    <script>
        fetch('/static/views/partials/nav-bar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));

        fetch('/static/views/partials/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('footer failed to load:', err));

        fetch('/static/views/partials/searchFilter.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('searchFilter-placeholder').innerHTML = html;
                initSearchFilter();
            })
            .catch(err => console.error('footer failed to load:', err));
    </script>
</body>
</html>
