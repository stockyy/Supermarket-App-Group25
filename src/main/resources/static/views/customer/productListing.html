<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/productListing.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Product Detail</title>
</head>
<body>
    <header class="header-container">
        <div id="nav-placeholder"></div>
        <div id="searchFilter-placeholder"></div>
    </header>

    <main class="all-products-container">
        <h1 class="page-heading">All Products</h1>
        <p class="result-count" id="result-count">Loading products...</p>

        <div class="product-grid" id="product-grid">


        </div>

        <nav class="pagination" id="pagination" aria-label="Page navigation">
        </nav>
    </main>

    <div id="footer-placeholder" class="footer-placeholder"></div>


    <!--SCRIPTS-->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/nav-bar.js"></script>
    <script src="/static/js/searchFilter.js"></script>
    <script src="/static/js/basket-count.js"></script>
    <script src="/static/js/basket-aside.js"></script>
    <script>
        fetch('/static/views/partials/nav-bar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
                refreshBasketCount();
                refreshBasketAside();
            })
            .catch(err => console.error('nav failed to load:', err));

        fetch('/static/views/partials/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('footer failed to load:', err));

        fetch('/static/views/partials/searchFilter.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('searchFilter-placeholder').innerHTML = html;
                initSearchFilter();
                loadCategoryFilters().then(function() {
                    setupSearchAndFilter();
                });
            })
            .catch(err => console.error('searchFilter failed to load:', err));
    </script>
<!--Populating scirpst-->
    <script>
        // Global variables for state
        var allProducts = [];
        var currentPage = 1;
        var productsPerPage = 20;

        // Run when page loads
        window.onload = function() {
            loadAllProducts();
        };

        function loadAllProducts() {
            loadProductsFromUrl('/products/getAll');
        }

        function loadProductsFromUrl(url) {
            fetch(url)
                .then(function(res) {
                    if (!res.ok) {
                        throw new Error('Server error: ' + res.status);
                    }
                    return res.json();
                })
                .then(function(data) {
                    allProducts = data;
                    showPage(1); // Reset to first page on new load
                })
                .catch(function(err) {
                    console.log('Error loading products:', err);
                    document.getElementById('result-count').innerHTML = 'Error: Could not load products.';
                });
        }

        function searchProducts(term) {
            loadProductsFromUrl('/products/search?name=' + encodeURIComponent(term));
        }

        function loadProductsByCategory(cat) {
            loadProductsFromUrl('/products/category/' + encodeURIComponent(cat));
        }

        // Sorting logic
        function sortProductsByPrice(direction) {
            if (direction === 'price-asc') {
                allProducts.sort(function(a, b) {
                    return a.price - b.price;
                });
            } else {
                allProducts.sort(function(a, b) {
                    return b.price - a.price;
                });
            }
            showPage(1);
        }

        function setupSearchAndFilter() {
            var searchBtn = document.querySelector('.search-submit');
            var input = document.getElementById('search-bar');

            if (searchBtn && input) {
                searchBtn.onclick = function() {
                    var term = input.value.trim();
                    if (term === '') {
                        loadAllProducts();
                    } else {
                        searchProducts(term);
                    }
                };

                input.onkeydown = function(e) {
                    if (e.key === 'Enter') { // Using .key instead of keyCode as it's more modern
                        var term = input.value.trim();
                        if (term === '') {
                            loadAllProducts();
                        } else {
                            searchProducts(term);
                        }
                    }
                };
            }
        }

        function showPage(pageNumber) {
            currentPage = pageNumber;
            var startIndex = (pageNumber - 1) * productsPerPage;
            var endIndex = startIndex + productsPerPage;
            var itemsToShow = allProducts.slice(startIndex, endIndex);

            displayProducts(itemsToShow);
            updateResultCount(startIndex, endIndex, allProducts.length);
            updatePagination();

            window.scrollTo(0, 0);
        }

        function loadCategoryFilters() {
            fetch('/products/categories')
                .then(function(response) {
                    return response.json();
                })
                .then(function(categories) {
                    var container = document.getElementById('category-filter-list');
                    container.innerHTML = '';

                    for (var i = 0; i < categories.length; i++) {
                        var categoryName = categories[i];
                        var btn = document.createElement('button');
                        btn.className = 'filter-option';
                        btn.innerHTML = categoryName;
                        btn.setAttribute('data-filter-value', categoryName);

                        btn.onclick = function() {
                            var val = this.getAttribute('data-filter-value');
                            loadProductsByCategory(val);
                        };

                        container.appendChild(btn);
                    }
                })
                .catch(function(err) {
                    console.error('Category load error:', err);
                });
        }

        function displayProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // clear everything first

            for (let i = 0; i < products.length; i++) {
                const product = products[i];
                const cardHtml = makeProductCard(product);
                grid.innerHTML = grid.innerHTML + cardHtml;
            }

            // links to the listener on click
            attachAddToBasketListeners();
        }

        function makeProductCard(product) {
            var stockClass = 'in-stock';
            var stockText = 'In stock';

            if (product.stockLevel === 0) {
                stockClass = 'no-stock';
                stockText = 'Out of stock';
            } else if (product.stockLevel < 10) {
                stockClass = 'low-stock';
                stockText = 'Low stock';
            }

            var imageUrl = product.imageUrl || '/static/images/placeholder.png';
            var price = parseFloat(product.price).toFixed(2);

            return '<div class="product-container" data-product-id="' + product.id + '">' +
                '<img src="' + imageUrl + '" alt="' + product.name + '">' +
                '<div class="product-info">' +
                '<p class="product-category">Category ' + product.categoryId + '</p>' +
                '<h3>' + product.name + '</h3>' +
                '<div class="stock-tag ' + stockClass + '">' +
                '<span>' + stockText + '</span>' +
                '</div>' +
                '<div class="product-bottom">' +
                '<p class="product-price">£' + price + '</p>' +
                '<button class="add-to-basket-btn" data-product-id="' + product.id + '" aria-label="Add ' + product.name + ' to basket">Add</button>' +
                '</div>' +
                '</div>' +
                '</div>';
        }

        function updateResultCount(start, end, total) {
            var resultCount = document.getElementById('result-count');
            var displayEnd = end > total ? total : end;
            resultCount.textContent = 'Showing ' + (start + 1) + '-' + displayEnd + ' of ' + total + ' products';
        }

        function updatePagination() {
            var pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            var totalPages = Math.ceil(allProducts.length / productsPerPage);

            if (totalPages <= 1) return; // Don't show if only one page

            // Prev Button
            var prevDisabled = (currentPage === 1) ? 'disabled' : '';
            pagination.innerHTML += '<button class="page-btn" ' + prevDisabled + ' onclick="showPage(' + (currentPage - 1) + ')">Prev</button>';

            // Page Numbers
            for (var i = 1; i <= totalPages; i++) {
                var active = (i === currentPage) ? 'active' : '';
                pagination.innerHTML += '<button class="page-btn ' + active + '" onclick="showPage(' + i + ')">' + i + '</button>';
            }

            // Next Button
            var nextDisabled = (currentPage === totalPages) ? 'disabled' : '';
            pagination.innerHTML += '<button class="page-btn" ' + nextDisabled + ' onclick="showPage(' + (currentPage + 1) + ')">Next</button>';
        }

        // Hooks up the click event for every Add button on the page
        function attachAddToBasketListeners() {
            const addButtons = document.querySelectorAll('.add-to-basket-btn');

            for (let i = 0; i < addButtons.length; i++) {
                const button = addButtons[i];

                button.addEventListener('click', function() {
                    // Get the product ID from the button's data attribute
                    const productId = button.dataset.productId;

                    // Send the add-to-basket request
                    addToBasket(productId, button);
                });
            }
        }

        // Sends the actual POST request to add an item
        function addToBasket(productId, buttonElement) {
            // Disable the button to stop double-clicks
            buttonElement.disabled = true;
            const originalText = buttonElement.textContent;
            buttonElement.textContent = 'Adding...';

            CustomerApi.addToBasket(productId, 1)
                .then(function(message) {
                    if (message === null) {
                        return;
                    }

                    // Show a quick success state on the button
                    buttonElement.textContent = 'Added!';

                    // Update the basket badge in the nav
                    refreshBasketCount();
                    refreshBasketAside();
                    // After a second, put the button back to normal
                    setTimeout(function() {
                        buttonElement.textContent = originalText;
                        buttonElement.disabled = false;
                    }, 1000);
                })
                .catch(function(error) {
                    console.error('Error adding to basket :', error);

                    // Put the button back so user can try again
                    buttonElement.textContent = originalText;
                    buttonElement.disabled = false;

                    alert('Could not add to basket. Please try again.');
                });
        }

    </script>

</body>
</html>
