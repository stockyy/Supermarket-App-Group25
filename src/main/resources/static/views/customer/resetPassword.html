<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/layout.css">
    <link rel="stylesheet" href="/static/stylesheets/customer/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Reset Password - 2850Mart</title>
</head>
<body>
<main id="reset-view" class="auth-view visible">
    <div class="auth-wrap">
        <section class="auth-form-panel" aria-labelledby="reset-heading">
            <div class="auth-form-wrap">

                <div class="auth-header">
                    <p class="auth-eyebrow">Account recovery</p>
                    <h1 id="reset-heading">Set a new password</h1>
                    <p>Choose a new password for your 2850Mart account.</p>
                </div>

                <div id="reset-error-banner" class="form-error-banner" role="alert" aria-live="assertive" hidden>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="reset-error-msg">Something went wrong.</span>
                </div>

                <form
                        id="reset-form"
                        action="/customers/resetPassword"
                        method="post"
                        novalidate
                >
                    <input type="hidden" name="token" id="reset-token" value="">

                    <div class="fields">

                        <div class="field">
                            <label for="reset-password">
                                New password <span class="req" aria-hidden="true">*</span>
                            </label>
                            <input
                                    type="password"
                                    id="reset-password"
                                    name="password"
                                    class="f-input"
                                    autocomplete="new-password"
                                    required
                                    minlength="8"
                                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}"
                                    title="Must contain at least one number, one uppercase and lowercase letter, and one special character (!@#$%^&*), and be at least 8 characters"
                                    placeholder="Create a strong password"
                            >
                            <span class="f-hint">Min 8 chars, with uppercase, lowercase, number, and special char.</span>
                        </div>

                        <div class="field">
                            <label for="reset-confirm-password">
                                Confirm new password <span class="req" aria-hidden="true">*</span>
                            </label>
                            <input
                                    type="password"
                                    id="reset-confirm-password"
                                    name="confirmPassword"
                                    class="f-input"
                                    autocomplete="new-password"
                                    required
                                    placeholder="Re-type your new password"
                            >
                        </div>

                        <button type="submit" class="btn btn-primary" id="reset-submit">
                            Reset Password
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>

                    </div>
                </form>

                <div class="auth-footer">
                    <p>
                        <a href="/customers/login" class="auth-back-link">
                            <span aria-hidden="true">&larr;</span> Back to Sign In
                        </a>
                    </p>
                </div>

            </div>
        </section>
    </div>
</main>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            document.getElementById('reset-token').value = token;
        }

        const error = urlParams.get('error');
        const banner = document.getElementById('reset-error-banner');
        const msg = document.getElementById('reset-error-msg');

        if (error) {
            banner.removeAttribute('hidden');
            if (error === 'passwords_dont_match') {
                msg.textContent = "Passwords don't match. Please try again.";
            } else if (error === 'weak_password') {
                msg.textContent = "Password must include an uppercase letter, lowercase letter, number, special character, and be at least 8 characters long.";
            } else if (error === 'invalid_token') {
                msg.textContent = "This reset link has expired or already been used. Please request a new one.";
            } else if (error === 'missing_fields') {
                msg.textContent = "Please fill in both password fields.";
            }
        }
    };

    document.getElementById('reset-form').addEventListener('submit', function(e) {
        const pass = document.getElementById('reset-password').value;
        const confirm = document.getElementById('reset-confirm-password').value;
        const banner = document.getElementById('reset-error-banner');
        const msg = document.getElementById('reset-error-msg');

        if (pass !== confirm) {
            e.preventDefault();
            msg.textContent = "Passwords don't match. Please try again.";
            banner.removeAttribute('hidden');
            document.getElementById('reset-confirm-password').focus();
        } else {
            banner.setAttribute('hidden', 'true');
        }
    });
</script>

</body>
</html>
