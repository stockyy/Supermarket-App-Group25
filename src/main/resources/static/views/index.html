<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Index</title>
</head>
<body>
    <div id="nav-placeholder"></div>
    <ul>
        <li>
            <a href="/customers/login">Login</a>
            <a href="/customers/register">Regsiter</a>
            <a href="/customers/forgotPasswordConf">Forgot Pass Confirm</a>
            <a href="/customers/landing">Landing</a>
            <a href="">Products</a>
        </li>
    </ul>
    <div id="footer-placeholder"></div>

    <script src="/static/js/nav-bar.js"></script>
    <script>
        fetch('/static/views/partials/nav-bar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));

        fetch('/static/views/partials/footer.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('footer failed to load:', err));
    </script>

</body>
</html>
