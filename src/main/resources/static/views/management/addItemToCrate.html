<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/management/addItemToCrate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Add Item To Crate</title>
</head>
<body>
    <main>
        <h1>Place Item in Crate</h1>
        <form action="/management/picking-a-list" method="GET">
            <div class="form-group">
                <label for="crate-id">Enter crate ID:</label>
                <input type="text" id="crate-id" placeholder="e.g. CR-502" required>
            </div>
            <button type="submit">Confirm & Finish</button>
        </form>
    </main>
</body>
</html>
