<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/management/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Staff Login</title>
</head>
<body>

    <header>
        <h2>Welcome Back</h2>
        <h1>Sign into your account</h1>
    </header>
    <main>
        <form action="/customers/login" method="post" id="login-form" novalidate>

            <div id="login-err-banner" class="err-banner" role="alert">
                Incorrect email or password. Please try again.
            </div>

            <div class="form-row">
                <label for="email">Email address</label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@2850mart.co.uk"
                        autocomplete="email"
                        required
                        aria-required="true"
                        aria-describedby="email-err"
                >
                <span class="field-err" id="email-err" role="alert">Please enter a valid email address.</span>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <div class="pass-container">
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Your password"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                            aria-describedby="pass-err"
                    >
                    <button type="button" class="show-pass" id="show-pass" aria-label="Show password">Show</button>
                </div>
                <span class="field-err" id="pass-err" role="alert">Password is required.</span>
            </div>

            <div class="forgot-row">
                <a href="/customers/forgotPassword">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

    </main>

    <script>
        // show/hide password
        const passInput = document.getElementById('password');
        const showBtn   = document.getElementById('show-pass');

        showBtn.addEventListener('click', () => {
            const show = passInput.type === 'password';
            passInput.type      = show ? 'text' : 'password';
            showBtn.textContent = show ? 'Hide' : 'Show';
            showBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });

        // basic client-side validation
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            const email    = document.getElementById('email');
            const emailErr = document.getElementById('email-err');
            const pass     = document.getElementById('password');
            const passErr  = document.getElementById('pass-err');

            if (!email.value || !email.value.includes('@')) {
                email.classList.add('err');
                emailErr.classList.add('visible');
                valid = false;
            } else {
                email.classList.remove('err');
                emailErr.classList.remove('visible');
            }

            if (!pass.value) {
                pass.classList.add('err');
                passErr.classList.add('visible');
                valid = false;
            } else {
                pass.classList.remove('err');
                passErr.classList.remove('visible');
            }

            if (!valid) return;

            // BACKEND: POST /customers/login { email, password }
            console.log('login submit', { email: email.value });
        });
    </script>
</body>
</html>
