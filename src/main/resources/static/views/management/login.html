<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/management/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Staff Login</title>
</head>
<body>

    <header>
        <h2>Welcome Back</h2>
        <h1>Sign into your account</h1>
    </header>
    <main>
        <form action="/management/staff/login" method="post" id="login-form" novalidate>

            <div id="login-err-banner" class="err-banner" role="alert">
                Incorrect staff ID or password. Please try again.
            </div>

            <div class="form-row">
                <label for="staffId">Staff ID Number</label>
                <input
                        type="text"
                        id="staffId"
                        name="staffId"
                        placeholder="e.g. 12345678"
                        pattern="\d{8}"
                        maxlength="8"
                        autocomplete="username"
                        required
                        aria-required="true"
                        aria-describedby="staffId-err"
                >
                <span class="field-err" id="staffId-err" role="alert">Please enter your 8-digit Staff ID.</span>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <div class="pass-container">
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Your password"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                            aria-describedby="pass-err"
                    >
                    <button type="button" class="show-pass" id="show-pass" aria-label="Show password">Show</button>
                </div>
                <span class="field-err" id="pass-err" role="alert">Password is required.</span>
            </div>

            <div class="forgot-row">
                <a href="/customers/forgotPassword">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

    </main>

    <script>
        // Check URL for backend errors on page load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);

            if (urlParams.get('error') === 'invalid_credentials') {
                document.getElementById('login-err-banner').style.display = 'block';
            }
        };

        // show/hide password
        const passInput = document.getElementById('password');
        const showBtn   = document.getElementById('show-pass');

        showBtn.addEventListener('click', () => {
            const show = passInput.type === 'password';
            passInput.type      = show ? 'text' : 'password';
            showBtn.textContent = show ? 'Hide' : 'Show';
            showBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });

        // basic client-side validation
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            const staffId = document.getElementById('staffId');
            const staffIdErr = document.getElementById('staffId-err');
            const pass     = document.getElementById('password');
            const passErr  = document.getElementById('pass-err');

            // Check if Staff ID is exactly 8 digits
            const staffIdRegex = /^\d{8}$/;
            if (!staffId.value || !staffIdRegex.test(staffId.value)) {
                staffId.classList.add('err');
                staffIdErr.classList.add('visible');
                valid = false;
            } else {
                staffId.classList.remove('err');
                staffIdErr.classList.remove('visible');
            }

            if (!pass.value) {
                pass.classList.add('err');
                passErr.classList.add('visible');
                valid = false;
            } else {
                pass.classList.remove('err');
                passErr.classList.remove('visible');
            }

            if (!valid) return;

            this.submit();
        });
    </script>
</body>
</html>
