<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/management/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Staff Login</title>
</head>
<body>

    <header>
        <h2>Welcome Back</h2>
        <h1>Sign into your account</h1>
    </header>
    <main>
        <form action="/customers/login" method="post" id="login-form" novalidate>

            <div id="login-err-banner" class="err-banner" role="alert">
                Incorrect email or password. Please try again.
            </div>

            <div class="form-row">
                <label for="email">Email address</label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@2850mart.co.uk"
                        autocomplete="email"
                        required
                        aria-required="true"
                        aria-describedby="email-err"
                >
                <span class="field-err" id="email-err" role="alert">Please enter a valid email address.</span>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <div class="pass-container">
                    <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Your password"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                            aria-describedby="pass-err"
                    >
                    <button type="button" class="show-pass" id="show-pass" aria-label="Show password">Show</button>
                </div>
                <span class="field-err" id="pass-err" role="alert">Password is required.</span>
            </div>

            <div class="forgot-row">
                <a href="/customers/forgotPassword">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

    </main>

    <script>
        // toggle password visibility
        var passwordField = document.getElementById('password');
        var toggleBtn = document.getElementById('show-pass');

        toggleBtn.onclick = function() {
            if (passwordField.type == 'password') {
                passwordField.type = 'text';
                toggleBtn.innerHTML = 'Hide';
            } else {
                passwordField.type = 'password';
                toggleBtn.innerHTML = 'Show';
            }
        };

        // login validation
        document.getElementById('login-form').onsubmit = function(e) {
            var email = document.getElementById('email').value;
            var pass = document.getElementById('password').value;
            var isValid = true;

            // reset errors first
            document.getElementById('email').classList.remove('err');
            document.getElementById('email-err').classList.remove('visible');
            document.getElementById('password').classList.remove('err');
            document.getElementById('pass-err').classList.remove('visible');

            // check email
            if (email == "" || email.indexOf('@') == -1) {
                document.getElementById('email').classList.add('err');
                document.getElementById('email-err').classList.add('visible');
                isValid = false;
            }

            // check password
            if (pass == "") {
                document.getElementById('password').classList.add('err');
                document.getElementById('pass-err').classList.add('visible');
                isValid = false;
            }

            if (!isValid) {
                e.preventDefault(); // stop form
            } else {
                // send to server
                console.log("logging in...");
            }
        };
    </script>
</body>
</html>
