<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/management/notOnShelf.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Not On Shelf</title>
</head>
<body>
    <div id="nav-placeholder"></div>
    <header>
        <button onclick="location.href='/management/pick-list'" class="back-btn">← Back</button>
        <button onclick="location.href='/management/select-full-list'"  class="see-full-list-btn">See Full List</button>
    </header>
    <main>
        <div class="top-half">
            <div class="sub-info-container">
                <h2>Subtitutions</h2>
                <span class="sub-id"></span>
                <span class="order-id"></span>
                <span class="original-product-id"></span>
                <span class="new-product-id"></span>
                <span class="original-price"></span>
                <span class="new-price"></span>
                <span class="sub-quant"></span>
                <span class="sub-weight"></span>
            </div>
            <img src="" alt="sub image">
        </div>
        <div class="bottom-half">
            <button>Add original product to potential offsales</button>
            <button>Defer to end of list</button>
            <button>Pick Substitution</button>
        </div>
    </main>

    <script>
        fetch('/static/views/partials/managementNavBar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));
    </script>
</body>
</html>
