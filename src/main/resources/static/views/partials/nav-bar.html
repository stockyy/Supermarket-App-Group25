    <div class="aside-header">

        <button class="aside-close" id="aside-close" aria-label="Close basket">

    </div>

    <div class="aside-body" id="aside-body">

                <p class="item-name">Organic Whole Milk 2L</p>
                <p class="item-unit-price">£1.45 each</p>
                <div class="item-controls">
                    <div class="item-stepper" role="group" aria-label="Quantity for Organic Whole Milk 2L">
                        <button data-action="dec" aria-label="Decrease">−</button>
                        <input type="number" value="2" min="1" max="99" aria-label="Quantity">
                        <button data-action="inc" aria-label="Increase">+</button>
                    </div>
                    <button class="item-remove" aria-label="Remove Organic Whole Milk 2L">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
                    </button>
                </div>
            </div>
            <span class="item-line-total">£2.90</span>
        </article>

        <article class="basket-item" data-cart-item-id="102">
            <div class="item-img" aria-hidden="true">🥚</div>
            <div class="item-details">

                <p class="item-unit-price">£2.99 each</p>
                <div class="item-controls">
                    <div class="item-stepper" role="group" aria-label="Quantity for Free Range Eggs 12 Pack">
                        <button data-action="dec" aria-label="Decrease">−</button>
                        <input type="number" value="1" min="1" max="99" aria-label="Quantity">
                        <button data-action="inc" aria-label="Increase">+</button>
                    </div>
                    <button class="item-remove" aria-label="Remove Free Range Eggs 12 Pack">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
                    </button>
                </div>
            </div>
            <span class="item-line-total">£2.99</span>
        </article>

        <div class="aside-empty" id="aside-empty" style="display:none;">
            <span style="font-size:48px;" aria-hidden="true">🛒</span>
