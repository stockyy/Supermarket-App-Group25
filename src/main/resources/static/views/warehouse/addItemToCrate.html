<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/addItemToCrate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <title>Add Item To Crate</title>
</head>
<body>

<main>
    <h1>Place Item in Crate <span id="display-crate-num"></span></h1>
    
    <div class="target-barcode-info">
        Target Barcode: <strong id="display-barcode">Loading...</strong>
    </div>

    <form id="crate-form">
        <div class="form-group">
            <label for="crate-input">Scan crate barcode:</label>
            <input type="text" id="crate-input" placeholder="e.g. CR-502" required>
        </div>
        <button type="submit" class="submit-btn">Confirm Placement</button>
    </form>
</main>

<!-- Validation Script -->
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('picklistId');
        const crateId = urlParams.get('crateId');

        document.getElementById('display-crate-num').textContent = crateId;

        let expectedBarcode = "";

        try {
            const response = await fetch(`/api/get-crate-barcode?crateId=${crateId}`);
            if (response.ok) {
                expectedBarcode = await response.text();
                document.getElementById('display-barcode').textContent = expectedBarcode;
            } else {
                document.getElementById('display-barcode').textContent = "Error loading barcode";
            }
        } catch (err) {
            console.error("Failed to load barcode:", err);
        }

        document.getElementById('crate-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const scannedBarcode = document.getElementById('crate-input').value.trim();

            if (scannedBarcode === expectedBarcode) {
                location.href = `/warehouse/picking-a-list?picklistId=${picklistId}`;
            } else {
                alert(`Incorrect Crate! You scanned ${scannedBarcode}, but the item belongs in ${expectedBarcode}.`);
                document.getElementById('crate-input').value = "";
            }
        });
    });
</script>
</body>
</html>
