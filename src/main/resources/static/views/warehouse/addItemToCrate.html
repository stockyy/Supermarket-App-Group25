because this has not been taught to me, as permitted by the COMP2850 module specification.

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/addItemToCrate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <title>Add Item To Crate - 2850Mart</title>
</head>
<body>

<main class="crate-action-shell">
    <section class="action-card">
        <header class="action-header">
            <p class="eyebrow">Active Picking Session</p>
            <h1>Place Item in Crate <span id="display-crate-num">...</span></h1>
        </header>

        <div class="target-barcode-info" aria-live="polite">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 5v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2z"/><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h10"/>
            </svg>
            <div>
                <span>Target Barcode</span>
                <strong id="display-barcode">Loading...</strong>
            </div>
        </div>

        <form id="crate-form" class="action-form">
            <div class="field">
                <label for="crate-input">Scan or enter crate barcode <span class="req">*</span></label>
                <input type="text" id="crate-input" class="f-input" placeholder="e.g. CRATE-001" required autofocus autocomplete="off">
                <span id="scan-err" class="f-err" role="alert"></span>
            </div>

            <div class="action-footer">
                <button type="submit" class="btn btn-primary">
                    Confirm Placement
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <a href="#" id="cancel-link" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </section>
</main>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('picklistId');
        const crateId = urlParams.get('crateId');

        document.getElementById('display-crate-num').textContent = crateId;
        document.getElementById('cancel-link').href = `/warehouse/picking-a-list?picklistId=${picklistId}`;

        let expectedBarcode = "";

        // Retrieve the expected barcode for the specific crate
        try {
            const response = await fetch(`/api/get-crate-barcode?crateId=${crateId}`);
            if (response.ok) {
                expectedBarcode = await response.text();
                document.getElementById('display-barcode').textContent = expectedBarcode;
            } else {
                document.getElementById('display-barcode').textContent = "Unknown Barcode";
                document.getElementById('display-barcode').classList.add('error-text');
            }
        } catch (err) {
            console.error("Failed to load barcode:", err);
        }

        const form = document.getElementById('crate-form');
        const input = document.getElementById('crate-input');
        const errMsg = document.getElementById('scan-err');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const scannedBarcode = input.value.trim();

            if (scannedBarcode === expectedBarcode) {
                // Return to picking list on successful scan
                location.href = `/warehouse/picking-a-list?picklistId=${picklistId}`;
            } else {
                // Visual feedback for incorrect scan
                input.classList.add('input-error');
                errMsg.textContent = `Incorrect Crate! Belonged in: ${expectedBarcode}`;
                input.value = "";
                input.focus();

                // Shake animation trigger
                form.classList.add('shake');
                setTimeout(() => form.classList.remove('shake'), 500);
            }
        });

        // Clear error styling on input
        input.addEventListener('input', () => {
            input.classList.remove('input-error');
            errMsg.textContent = "";
        });
    });
</script>
</body>
</html>
