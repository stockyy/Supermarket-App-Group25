<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/offSales.css">
    <script src="/static/js/warehouse-nav.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Offsales</title>
</head>
<body>
<div id="nav-placeholder" aria-label="Main Navigation"></div>

<main style="display: none;" id="main-content" aria-labelledby="off-sale-heading">
    <div class="left-side">
        <h2 id="product-name">Loading...</h2>
        <img id="product-img" src="" alt="Product Image" aria-label="Image of product to be marked offsale">
    </div>

    <div class="right-side">
        <div class="right-side-content">
            <h2 id="off-sale-heading">Set stock level to 0 and report offsale?</h2>
            <div class="btns-container" role="group" aria-label="Offsale confirmation actions">
                <button id="yes-btn" aria-label="Confirm: set stock to zero and mark as offsale">Yes, Offsale Item</button>
                <button id="no-btn" aria-label="Cancel and return to dashboard">No, Cancel</button>
            </div>
        </div>
    </div>
</main>

<div class="modal-backdrop" aria-hidden="true"></div>
<div class="popup-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-text">
    <div class="modal-content">
        <h2 class="modal-title" id="modal-title" aria-live="polite"></h2>
        <p class="modal-text" id="modal-text" aria-live="polite"></p>
        <button class="btn-primary close-modal-btn" aria-label="Acknowledge message and close modal">OK</button>
    </div>
</div>

<script>
    initWarehouseNav('offsales');

    const modalBackdrop = document.querySelector('.modal-backdrop');
    const popupModal = document.querySelector('.popup-modal');
    const closeModalBtn = document.querySelector('.close-modal-btn');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');

    let redirectOnClose = false;

    function openModal(title, text, isError = false, redirect = false) {
        modalTitle.textContent = title;
        modalText.textContent = text;
        redirectOnClose = redirect;
        if (isError) {
            popupModal.classList.add('error');
        } else {
            popupModal.classList.remove('error');
        }
        modalBackdrop.classList.add('open');
        popupModal.classList.add('open');

        // Accessibility: move focus to the OK button when modal opens
        setTimeout(() => closeModalBtn.focus(), 100);
    }

    function closeModal() {
        modalBackdrop.classList.remove('open');
        popupModal.classList.remove('open');
        if (redirectOnClose) {
            location.href = '/warehouse/dashboard';
        }
    }

    closeModalBtn.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);


    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product-id');

        if (!productId) {
            openModal("Error", "No Product ID provided.", true, true);
            return;
        }

        try {
            const res = await fetch(`/api/product?id=${productId}`);
            if (!res.ok) throw new Error("Product not found");
            const product = await res.json();

            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-img').src = product.imageUrl || '/static/images/placeholder.png';
            document.getElementById('main-content').style.display = 'flex';
        } catch (e) {
            openModal("Error", "Failed to load product.", true, true);
        }

        document.getElementById('no-btn').addEventListener('click', () => {
            location.href = '/warehouse/dashboard';
        });

        document.getElementById('yes-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/log-offsale-direct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: parseInt(productId) })
                });

                if (response.ok) {
                    openModal("Success", "Item marked as offsale and stock zeroed.", false, true);
                } else {
                    const errorMsg = await response.text();
                    openModal("Offsale Failed", errorMsg || "Failed to offsale item.", true);
                }
            } catch(err) {
                openModal("Connection Error", "Could not connect to the server. Please try again later.", true);
            }
        });
    });
</script>
</body>
</html>
