<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/pickListFinished.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Pick List Finished</title>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <h1>Putaway Crates</h1>
        <p class="info-text">Enter the crate ID and putaway location for each crate. Up to 6 crates.</p>

        <div class="crate-options-container">
            <div class="crate-row">
                <label class="crate-label" for="crate-1-id">Crate 1</label>
                <input type="text" id="crate-1-id" name="crate-1-id" placeholder="Crate ID" required>
                <input type="text" id="crate-1-location" name="crate-1-location" placeholder="Putaway location">
            </div>

            <div class="crate-row">
                <label class="crate-label" for="crate-2-id">Crate 2</label>
                <input type="text" id="crate-2-id" name="crate-2-id" placeholder="Crate ID">
                <input type="text" id="crate-2-location" name="crate-2-location" placeholder="Putaway location">
            </div>

            <div class="crate-row">
                <label class="crate-label" for="crate-3-id">Crate 3</label>
                <input type="text" id="crate-3-id" name="crate-3-id" placeholder="Crate ID">
                <input type="text" id="crate-3-location" name="crate-3-location" placeholder="Putaway location">
            </div>

            <div class="crate-row">
                <label class="crate-label" for="crate-4-id">Crate 4</label>
                <input type="text" id="crate-4-id" name="crate-4-id" placeholder="Crate ID">
                <input type="text" id="crate-4-location" name="crate-4-location" placeholder="Putaway location">
            </div>

            <div class="crate-row">
                <label class="crate-label" for="crate-5-id">Crate 5</label>
                <input type="text" id="crate-5-id" name="crate-5-id" placeholder="Crate ID">
                <input type="text" id="crate-5-location" name="crate-5-location" placeholder="Putaway location">
            </div>

            <div class="crate-row">
                <label class="crate-label" for="crate-6-id">Crate 6</label>
                <input type="text" id="crate-6-id" name="crate-6-id" placeholder="Crate ID">
                <input type="text" id="crate-6-location" name="crate-6-location" placeholder="Putaway location">
            </div>
        </div>

        <button class="submit-btn" onclick="location.href='/warehouse/dashboard'">Complete Putaway</button>
    </main>

    <script>
        fetch('/static/views/partials/managementNavBar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));
    </script>
</body>
</html>
