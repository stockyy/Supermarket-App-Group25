<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/pickListFinished.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <title>Pick List Finished</title>
</head>
<body>

<main aria-labelledby="main-heading">
    <h1 id="main-heading">Putaway Crates</h1>
    <p class="info-text">Please put the crates away in their respective putaway locations.</p>

    <div class="crate-options-container" id="putaway-container" role="region" aria-live="polite" aria-label="Crate putaway locations list">
        <p>Loading putaway locations...</p>
    </div>

    <button class="submit-btn" onclick="location.href='/warehouse/dashboard'" aria-label="Confirm all crates are put away and return to dashboard">Complete Putaway</button>
</main>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('picklistId');
        const container = document.getElementById('putaway-container');

        if (!picklistId) {
            container.innerHTML = "<p class='error-text' role='alert'>Error: No Picklist ID provided.</p>";
            return;
        }

        try {
            const response = await fetch(`/api/putaway-details?picklistId=${picklistId}`);
            if (!response.ok) throw new Error("Failed to fetch putaway details");

            const crates = await response.json();
            container.innerHTML = "";

            crates.forEach(crate => {
                const row = document.createElement('div');
                row.className = 'crate-row';
                row.setAttribute('role', 'group');
                row.setAttribute('aria-label', `Putaway details for Crate ${crate.crateNumber}`);

                row.innerHTML = `
                    <label class="crate-label" id="label-crate-${crate.crateNumber}">Crate ${crate.crateNumber}</label>
                    <input type="text" value="${crate.crateBarcode}" disabled class="barcode-input" aria-label="Crate Barcode" aria-readonly="true">
                    <input type="text" value="${crate.putawayLocation}" disabled class="location-input" aria-label="Target Putaway Location" aria-readonly="true">
                `;

                container.appendChild(row);
            });

        } catch (err) {
            console.error(err);
            container.innerHTML = "<p class='error-text' role='alert'>Failed to load putaway locations.</p>";
        }
    });
</script>

</body>
</html>
