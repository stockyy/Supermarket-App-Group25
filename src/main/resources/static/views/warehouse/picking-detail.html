    <main class="picking-detail">
        <!-- Order Header -->
        <div class="order-header">
            <a href="/views/warehouse/picking-list">Picking List</a>
            <h2>Oder <span id="order-id">XXXXX</span></h2>
            <div class="order-details">
                <p>Customer <strong id="pick-order-name">JOHN PATEL</strong></p>
                <p>Deliver Slot: <strong id="pick-order-time">TIME TIME TIME</strong></p>
                <p>Status: <strong id="pick-order-status">STATUS</strong></p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Required Qty</th>
                    <th>Current Stock</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

    <div class="sub-modal-overlay">
        <section class="sub-mod-section">
            <div class="sub-mod-container">
                <h2>Choose Subtitute</h2>
                <p>
                    Substituing: <strong id="sub-mod-item">NAME OF ORIGINAL ITEM<strong>
                </p>
                <input type="text" id="subtitute-search">

                <ul class="subtitute-results">
                    <li>
                        <button class="select-sub-btn" data-product-id="XXX">
                        SUBITUTE NAME
                        </button>
                    </li>
                </ul>

                <div id="selected-substitute" style="display:none;">
                    <p>Selected: <strong id="selected-substitute-name"></strong></p>
                </div>

                <div class="modal-actions">
                    <button id="confirm-substitute-btn" class="confirm-btn" disabled>
                        Confirm Substitute
                    </button>
                    <button id="cancel-substitute-btn" class="cancel-btn">
                        Cancel
                    </button>
                </div>
            </div>
