<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/pickingAList.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Picking List</title>
</head>
<body>
    <div id="nav-placeholder"></div>

    <header>
        <button onclick="history.back()" class="back-btn">← Back</button>
        <button onclick="location.href='/warehouse/see-full-list'"  class="see-full-list-btn">See Full List</button>
    </header>

    <main>

        <div class="left-side">
            <h1 id="product-name">Product Name</h1>
            <!-- BACKEND: Product.image_url -->
            <img src="/static/images/placeholder.png" alt="" id="product-img">
        </div>

        <div class="right-side">

            <div class="product-info">

                <div class="info-row">
                    <span class="info-label">Line number</span>
                    <span class="info-value" id="line-number">#1042</span>
                </div>

                <div class="info-divider"></div>

                <div class="info-row">
                    <span class="info-label">Order</span>
                    <span class="info-value" id="order-id">#ORD-8831</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Picklist</span>
                    <span class="info-value" id="picklist-id">#PL-204</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Crate</span>
                    <span class="info-value" id="crate-id">Crate 3</span>
                </div>

                <div class="info-divider"></div>

                <div class="info-row">
                    <span class="info-label">Quantity required</span>
                    <span class="info-value" id="qty-required">×2</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Category</span>
                    <span class="info-value" id="category">Dairy &amp; Eggs</span>
                </div>

                <div class="info-row">
                    <span class="info-label">Waste bag</span>
                    <span class="info-value" id="waste-bag">Green</span>
                </div>

                <div class="info-divider"></div>

                <div class="info-row">
                    <span class="info-label">Substituted</span>
                    <span class="sub-badge" id="sub-badge">⚠ Yes</span>
                </div>

            </div>

            <button class="pick-btn" id="pick-btn">Pick Item</button>
            <button class="not-on-shelf-btn" id="not-on-shelf-btn" onclick="location.href='/warehouse/not-on-shelf'">Not on Shelf</button>

        </div>

        <button class="submit-btn" onclick="location.href='/warehouse/picklist-finished'">Submit</button>


        <div class="modal-backdrop" id="backdrop"></div>

        <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-content">
                <h2 class="modal-title" id="modal-title">Confirm Picking</h2>

                <form action="/warehouse/add-item-to-cart" method="GET" class="modal-form">
                    <div class="form-group">
                        <label class="form-label" for="quant-input">Quantity Required</label>
                        <input type="number"
                               id="quant-input"
                               name="quant_required"
                               class="form-input"
                               value="1"
                               readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="quant-picked">Quantity Picked</label>
                        <input type="number"
                               id="quant-picked"
                               name="quant_picked"
                               class="form-input"
                               placeholder="0"
                               inputmode="numeric"
                               required>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn-primary" id="modal-submit-btn">Confirm Pick</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script>
    fetch('/static/views/partials/managementNavBar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
            initBasket();
        })
        .catch(err => console.error('nav failed to load:', err));
    </script>
<!--    Modal Script-->
    <script>
        const openBtn  = document.getElementById('pick-btn');
        const closeBtn = document.getElementById('modal-close-btn');
        const backdrop = document.getElementById('backdrop');
        const modal    = document.getElementById('modal');
        const form     = document.getElementById('modal-form');

        function openModal() {
            modal.classList.add('open');
            backdrop.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
            backdrop.classList.remove('open');
            form.reset();
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            closeModal();
        });
    </script>
</body>
</html>
