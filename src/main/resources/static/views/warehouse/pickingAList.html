<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/modals.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/pickingAList.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <title>Picking List</title>
</head>
<body>

<header role="banner">
    <div class="picking-clock" aria-label="Current picking session time">
        <span>Current time</span>
        <strong id="picking-current-time" aria-live="off">--:--:--</strong>
    </div>
    <button id="see-full-list-btn" class="see-full-list-btn" aria-label="View the full picking list for this session">See Full List</button>
</header>

<main aria-labelledby="product-name">

    <div class="left-side">
        <h1 id="product-name" aria-live="polite">Product Name</h1>
        <img src="/static/images/placeholder.png" alt="Product image" id="product-img">
    </div>

    <div class="right-side">

        <div class="product-info" role="region" aria-label="Item specifications">

            <div class="info-row">
                <span class="info-label" id="label-line">Line number</span>
                <span class="info-value" id="line-number" aria-labelledby="label-line">#1042</span>
            </div>

            <div class="info-divider" aria-hidden="true"></div>

            <div class="info-row">
                <span class="info-label" id="label-order">Order</span>
                <span class="info-value" id="order-id" aria-labelledby="label-order">#ORD-8831</span>
            </div>

            <div class="info-row">
                <span class="info-label" id="label-picklist">Picklist</span>
                <span class="info-value" id="picklist-id" aria-labelledby="label-picklist">#PL-204</span>
            </div>

            <div class="info-row">
                <span class="info-label" id="label-crate">Crate</span>
                <span class="info-value" id="crate-id" aria-labelledby="label-crate">Crate 3</span>
            </div>

            <div class="info-divider" aria-hidden="true"></div>

            <div class="info-row">
                <span class="info-label" id="label-qty">Quantity required</span>
                <span class="info-value" id="qty-required" aria-labelledby="label-qty">×2</span>
            </div>

            <div class="info-row">
                <span class="info-label" id="label-cat">Category</span>
                <span class="info-value" id="category" aria-labelledby="label-cat">Dairy &amp; Eggs</span>
            </div>

            <div class="info-row">
                <span class="info-label" id="label-waste">Waste bag</span>
                <span class="info-value" id="waste-bag" aria-labelledby="label-waste">Green</span>
            </div>

            <div class="info-divider" aria-hidden="true"></div>

            <div class="info-row">
                <span class="info-label" id="label-loc">Location</span>
                <span class="info-value" id="location" aria-labelledby="label-loc">Loading...</span>
            </div>

        </div>

        <button class="pick-btn" id="pick-btn" aria-label="Confirm picking this item">Pick Item</button>
        <button class="not-on-shelf-btn" id="not-on-shelf-btn" aria-label="Report that this item is not on the shelf">Not on Shelf</button>

        <button id="dev-auto-pick-btn" class="dev-auto-pick-btn" aria-label="Developer tool: Auto-pick entire list">
            [DEV] Auto-Pick Entire List
        </button>

    </div>


    <div class="modal-backdrop" id="backdrop" aria-hidden="true"></div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title">Confirm Picking</h2>

            <form id="confirm-pick-form" aria-label="Confirm picked quantity">
                <div class="form-group">
                    <label class="form-label" for="qty-input">Quantity Required</label>
                    <input type="number"
                           id="qty-input"
                           name="qty_required"
                           class="form-input"
                           value="1"
                           readonly
                           aria-readonly="true">
                </div>

                <div class="form-group">
                    <label class="form-label" for="qty-picked">Quantity Picked</label>
                    <input type="number"
                           id="qty-picked"
                           name="qty_picked"
                           class="form-input"
                           placeholder="0"
                           inputmode="numeric"
                           required
                           aria-required="true">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()" aria-label="Cancel picking">Cancel</button>
                    <button type="submit" class="btn-primary" id="modal-submit-btn" aria-label="Submit picked quantity">Confirm Pick</button>
                </div>
            </form>
        </div>
    </div>

</main>

<script>
    const pickingTimeFormatter = new Intl.DateTimeFormat('en-GB', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });

    function updatePickingTime() {
        document.getElementById('picking-current-time').textContent = pickingTimeFormatter.format(new Date());
    }

    updatePickingTime();
    setInterval(updatePickingTime, 1000);
</script>

<script>
    const openBtn  = document.getElementById('pick-btn');
    const backdrop = document.getElementById('backdrop');
    const modal    = document.getElementById('modal');
    const form     = document.getElementById('confirm-pick-form');

    function openModal() {
        modal.classList.add('open');
        backdrop.classList.add('open');
        // accessibility: move focus to the input
        setTimeout(() => document.getElementById('qty-picked').focus(), 100);
    }

    function closeModal() {
        modal.classList.remove('open');
        backdrop.classList.remove('open');
        document.getElementById('qty-picked').value = '';
    }

    openBtn.addEventListener('click', openModal);
    backdrop.addEventListener('click', closeModal);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const pickItemId = parseInt(document.getElementById('pick-btn').dataset.pickItemId);
        const qtyPicked = parseInt(document.getElementById('qty-picked').value);
        const maxRequired = parseInt(document.getElementById('qty-input').value);
        const picklistId = new URLSearchParams(window.location.search).get('picklistId');

        const crateText = document.getElementById('crate-id').textContent;
        const crateId = crateText.replace('Crate ', '').trim();

        if (qtyPicked <= 0) {
            alert("You must pick at least 1 item.");
            return;
        }
        if (qtyPicked > maxRequired) {
            alert(`You cannot pick more than the required amount (${maxRequired}).`);
            return;
        }

        try {
            const response = await fetch('/api/confirm-pick', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    pickItemId: pickItemId,
                    qtyPicked: qtyPicked
                })
            });

            if (response.ok) {
                closeModal();
                location.href = `/warehouse/add-item-to-crate?picklistId=${picklistId}&crateId=${crateId}`;
            } else {
                alert("Failed to confirm pick in database.");
            }
        } catch(err) {
            console.error(err);
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('picklistId');

        // Set the onclick for the see-full-list-btn here
        const seeFullListBtn = document.getElementById('see-full-list-btn');
        if (seeFullListBtn && picklistId) {
            seeFullListBtn.onclick = () => {
                location.href = `/warehouse/see-full-list?picklistId=${picklistId}`;
            };
        }


        if (!picklistId) {
            alert("Error: No Picklist ID found in URL.");
            return;
        }

        try {
            const response = await fetch(`/api/next-pick-item?picklistId=${picklistId}`);

            if (!response.ok) throw new Error("Failed to fetch item");

            const data = await response.text();

            if (data === "LIST_FINISHED") {
                location.href = `/warehouse/picklist-finished?picklistId=${picklistId}`;
                return;
            }

            const item = JSON.parse(data);

            document.getElementById('product-name').textContent = item.isSubstitute ? `SUB: ${item.productName}` : item.productName;
            document.getElementById('order-id').textContent = `#ORD-${item.orderId}`;
            document.getElementById('picklist-id').textContent = `#PL-${item.picklistId}`;
            document.getElementById('crate-id').textContent = `Crate ${item.crateId}`;
            document.getElementById('qty-required').textContent = `×${item.quantityRequired}`;
            document.getElementById('category').textContent = item.categoryName;
            document.getElementById('waste-bag').textContent = item.wasteBag;
            document.getElementById('line-number').textContent = `#${item.pickItemId}`;

            document.getElementById('location').textContent = item.location;

            const imgElement = document.getElementById('product-img');
            imgElement.src = item.imageDir;

            document.getElementById('pick-btn').dataset.pickItemId = item.pickItemId;

            document.getElementById('qty-input').value = item.quantityRequired;

            document.getElementById('qty-picked').max = item.quantityRequired;

        } catch (err) {
            console.error(err);
            document.getElementById('product-name').textContent = "Error loading item.";
        }
    });
</script>

<script>
    const devAutoPickBtn = document.getElementById('dev-auto-pick-btn');
    if (devAutoPickBtn) {
        devAutoPickBtn.addEventListener('click', async () => {
            const picklistId = parseInt(new URLSearchParams(window.location.search).get('picklistId'));

            if (!picklistId) return;

            if (confirm("Are you sure you want to instantly pick all remaining items?")) {
                try {
                    const response = await fetch('/api/auto-pick-all', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ picklistId: picklistId })
                    });

                    if (response.ok) {
                        location.href = `/warehouse/picklist-finished?picklistId=${picklistId}`;
                    } else {
                        alert("Auto-pick failed.");
                    }
                } catch (e) {
                    console.error("Auto-pick error:", e);
                }
            }
        });
    }
</script>

<script>
    document.getElementById('not-on-shelf-btn').addEventListener('click', () => {
        const pickItemId = document.getElementById('pick-btn').dataset.pickItemId;
        const picklistId = new URLSearchParams(window.location.search).get('picklistId');

        const crateId = document.getElementById('crate-id').textContent.replace('Crate ', '').trim();

        if (pickItemId && picklistId) {
            location.href = `/warehouse/not-on-shelf?pickItemId=${pickItemId}&picklistId=${picklistId}&crateId=${crateId}`;
        }
    });
</script>
</body>
</html>
