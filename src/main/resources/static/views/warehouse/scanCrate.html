<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/scanCrate.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Scan Crate</title>
</head>
<body>

    <div id="nav-placeholder"></div>

    <main>
        <h1>Scan Crates</h1>
        <p class="info-text">Enter at least 1 crate ID, up to 6.</p>

        <div class="crates-container">
            <div class="crate-row">
                <label for="crate-1">Crate 1:</label>
                <input type="text" id="crate-1" placeholder="Input crate ID" required>
            </div>

            <div class="crate-row">
                <label for="crate-2">Crate 2:</label>
                <input type="text" id="crate-2" placeholder="Optional">
            </div>

            <div class="crate-row">
                <label for="crate-3">Crate 3:</label>
                <input type="text" id="crate-3" placeholder="Optional">
            </div>

            <div class="crate-row">
                <label for="crate-4">Crate 4:</label>
                <input type="text" id="crate-4" placeholder="Optional">
            </div>

            <div class="crate-row">
                <label for="crate-5">Crate 5:</label>
                <input type="text" id="crate-5" placeholder="Optional">
            </div>

            <div class="crate-row">
                <label for="crate-6">Crate 6:</label>
                <input type="text" id="crate-6" placeholder="Optional">
            </div>
        </div>

        <button class="submit-btn" onclick="location.href='/warehouse/select-picks'">Done</button>
    </main>

    <div class="modal-backdrop"></div>
    <div class="err-popup-modal">
        <div class="modal-content">
            <h2 class="modal-title">Crate Already In Use</h2>
            <p class="modal-text">One or more of the crate IDs you entered is currently assigned to another order. Please check the crate ID and try again.</p>
            <button class="btn-primary close-modal-btn">OK</button>
        </div>
    </div>

    <script>
        fetch('/static/views/partials/managementNavBar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));
    </script>

    <script>
        const modalBackdrop = document.querySelector('.modal-backdrop');
        const errModal = document.querySelector('.err-popup-modal');
        const closeModalBtn = document.querySelector('.close-modal-btn');

        function openErrModal() {
            modalBackdrop.classList.add('open');
            errModal.classList.add('open');
        }

        function closeErrModal() {
            modalBackdrop.classList.remove('open');
            errModal.classList.remove('open');
        }

        closeModalBtn.addEventListener('click', closeErrModal);
        modalBackdrop.addEventListener('click', closeErrModal);
    </script>
</body>
</html>
