<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/seeFullList.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>See Full List</title>
</head>
<body>
<div id="nav-placeholder"></div>

<header>
    <a href="javascript:history.back()" class="back-btn" aria-label="Back">← Back</a>
    <h1 id="list-title">Loading...</h1>
</header>

<main>
    <ul class="item-list"></ul>
</main>

<script>
    fetch('/static/views/partials/managementNavBar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;

            ['nav-select-picks', 'nav-home', 'nav-settings'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
        })
        .catch(err => console.error('nav failed to load:', err));
</script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const picklistId = urlParams.get('picklistId');
        const itemList = document.querySelector('.item-list');
        const listTitle = document.getElementById('list-title');

        if (!picklistId) {
            listTitle.textContent = "Error: No Picklist ID found in URL.";
            return;
        }

        listTitle.textContent = `Remaining Items for Picklist #${picklistId}`;

        try {
            const response = await fetch(`/warehouse/api/full-picklist?picklistId=${picklistId}`);
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const items = await response.json();

            if (items.length === 0) {
                const li = document.createElement('li');
                li.textContent = 'All items on this list have been picked.';
                itemList.appendChild(li);
                return;
            }

            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'product-card';

                const isSub = item.isSubstitute;

                li.innerHTML = `
                    <img src="${item.imageDir ? item.imageDir : '/static/images/placeholder.png'}" alt="Product Image" class="card-img">
                    <div class="card-info">
                        <h2 class="card-title">${isSub ? `SUB: ` : ''}${item.productName}</h2>
                        <p class="card-detail"><strong>Location:</strong> ${item.location}</p>
                        <p class="card-detail"><strong>Quantity:</strong> ${item.quantityRequired}</p>
                        <p class="card-detail"><strong>Crate:</strong> ${item.crateId}</p>
                    </div>
                `;
                itemList.appendChild(li);
            });

        } catch (error) {
            console.error('Error fetching picklist data:', error);
            listTitle.textContent = 'Error loading picklist data.';
        }
    });
</script>
</body>
</html>
