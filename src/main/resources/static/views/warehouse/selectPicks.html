<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/selectPicks.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Select Picks</title>
</head>
<body>
<header class="header-container">
    <div id="nav-placeholder"></div>
</header>

<main aria-labelledby="picks-title">
    <div class="picks-clock" aria-label="Current warehouse time">
        <span>Current time</span>
        <strong id="select-picks-current-time" aria-live="off">--:--:--</strong>
    </div>
    <h1 id="picks-title" class="picks-heading">Select a Section</h1>
    <p class="picks-subheading">Choose which section you're picking today</p>

    <div class="section-grid" role="group" aria-label="Warehouse sections">
        <button class="section-btn" data-section="FRV_AND_BRD" aria-labelledby="label-frv">
            <span id="label-frv" class="section-name">FRV &amp; Bread</span>
            <span class="count-text">Num lists remaining...</span>
        </button>
        <button class="section-btn" data-section="AMBIENT" aria-labelledby="label-ambient">
            <span id="label-ambient" class="section-name">Ambient</span>
            <span class="count-text">Num lists remaining...</span>
        </button>
        <button class="section-btn" data-section="CHILLED" aria-labelledby="label-chilled">
            <span id="label-chilled" class="section-name">Chilled</span>
            <span class="count-text">Num lists remaining...</span>
        </button>
        <button class="section-btn" data-section="FROZEN" aria-labelledby="label-frozen">
            <span id="label-frozen" class="section-name">Frozen</span>
            <span class="count-text">Num lists remaining...</span>
        </button>
    </div>

</main>


<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Load partial navigation
        fetch('/static/views/partials/warehouseNavBar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
            });
    });

    const sectionBtns = document.querySelectorAll('.section-btn');

    sectionBtns.forEach(btn => {
        btn.addEventListener('click', async () => {
            const section = btn.dataset.section;

            const formData = new URLSearchParams();
            formData.append('section', section);

            const response = await fetch('/api/claim-picklist', { method: 'POST', body: formData });

            if (response.ok) {
                const data = await response.json();
                location.href = `/warehouse/scan-crates?picklistId=${data.picklistId}&cratesNeeded=${data.cratesNeeded}`;
            } else {
                alert("No lists available in this section!");
            }
        });
    });
</script>


<script>
    const selectPicksTimeFormatter = new Intl.DateTimeFormat('en-GB', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });

    function updateSelectPicksTime() {
        document.getElementById('select-picks-current-time').textContent = selectPicksTimeFormatter.format(new Date());
    }

    updateSelectPicksTime();
    setInterval(updateSelectPicksTime, 1000);
</script>

<script>
    fetch('/api/available-picklists')
        .then(response => response.json())
        .then(data => {
            document.querySelectorAll('.section-btn').forEach(btn => {
                const sectionName = btn.dataset.section;
                const count = data[sectionName] || 0;

                const textSpan = btn.querySelector('.count-text');
                textSpan.textContent = `${count} lists remaining`;

                if (count === 0) {
                    btn.style.opacity = "0.5";
                    btn.style.pointerEvents = "none";
                    btn.setAttribute('aria-disabled', 'true');
                    btn.setAttribute('title', 'No lists available');
                } else {
                    btn.removeAttribute('aria-disabled');
                }
            });
        })
        .catch(err => console.error("Failed to load picklist counts:", err));
</script>
</body>
</html>
