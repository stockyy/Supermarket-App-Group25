<!doctype html>
<!--
ACADEMIC INTEGRITY DECLARATION:
The JavaScript logic within the <script> tags of this file (including DOM manipulation,
modal toggling, and asynchronous fetch requests to the backend) was primarily written
with the supportive use of generative AI (Gemini 3 pro) to assist with frontend development
because this has not been taught to me, as permitted by the COMP2850 module specification.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/settings.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Settings</title>
</head>
<body>
<div id="nav-placeholder"></div>



<main>
    <div class="top-side" style="display: none;" id="profile-container">
        <div class="profile-details">
            <div class="detail-row">
                <span class="detail-label">Name</span>
                <span class="detail-value" id="profile-name">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">User ID</span>
                <span class="detail-value" id="profile-id">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value" id="profile-email">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Phone Number</span>
                <span class="detail-value" id="profile-phone">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Role</span>
                <span class="detail-value" id="profile-role">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Date of Birth</span>
                <span class="detail-value" id="profile-dob">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Total Picks Completed</span>
                <span class="detail-value" id="profile-picks">...</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Pick Rate:</span>
                <span class="detail-value" id="profile-rate">...</span>
            </div>
        </div>
    </div>
    <form action="/management/logout" method="post" class="logout-form">
        <button type="submit" class="logout-button">Logout</button>
    </form>
    <p id="error-message" style="display: none; color: var(--clr-err); font-family: 'Poppins';">Error loading profile data.</p>
</main>

<script>
    fetch('/static/views/partials/managementNavBar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('nav-placeholder').innerHTML = html;
        })
        .catch(err => console.error('nav failed to load:', err));

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('/api/worker-profile');
            if (!response.ok) throw new Error("Failed to fetch profile");

            const data = await response.json();

            document.getElementById('profile-name').textContent = data.name;
            document.getElementById('profile-id').textContent = data.staffId;
            document.getElementById('profile-email').textContent = data.email;
            document.getElementById('profile-phone').textContent = data.phone;
            document.getElementById('profile-role').textContent = data.role.replace(/_/g, ' ');
            document.getElementById('profile-dob').textContent = data.dob;
            document.getElementById('profile-picks').textContent = data.totalPicksCompleted;
            document.getElementById('profile-rate').textContent = data.averagePickRate + ' items/hr';

            document.getElementById('profile-container').style.display = 'block';
        } catch (error) {
            console.error(error);
            document.getElementById('error-message').style.display = 'block';
        }
    });
</script>
</body>
</html>
