<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/stockLevels.css">
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Stock Levels</title>
</head>
<body>
<div id="nav-placeholder"></div>

<main style="display: none;" id="main-content">
    <h1 id="product-name">Loading...</h1>
    <img id="product-image" src="" alt="Product Image" style="display: block; max-width: 150px; margin: 0 auto 1.5rem; border-radius: 8px;">

    <div class="product-details-extra">
        <p><strong>Product ID:</strong> <span id="product-id">...</span></p>
        <p><strong>Location:</strong> <span id="product-location">...</span></p>
    </div>

    <div class="current-stock-container">
        <h2>Current Stock Level</h2>
        <span id="current-stock">...</span>
    </div>

    <form id="stock-form">
        <div class="ammend-stock-container">
            <h2>Amend Stock Level</h2>
            <input type="number" id="new-stock" placeholder="Enter new exact stock level" required>
        </div>

        <button type="submit">Submit Update</button>
    </form>
</main>

<div class="modal-backdrop"></div>
<div class="popup-modal">
    <div class="modal-content">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-text" id="modal-text"></p>
        <button class="btn-primary close-modal-btn">OK</button>
    </div>
</div>

<script>
    fetch('/static/views/partials/managementNavBar.html')
        .then(res => res.text())
        .then(html => document.getElementById('nav-placeholder').innerHTML = html);

    const modalBackdrop = document.querySelector('.modal-backdrop');
    const popupModal = document.querySelector('.popup-modal');
    const closeModalBtn = document.querySelector('.close-modal-btn');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');

    let redirectOnClose = false;

    function openModal(title, text, isError = false, redirect = false) {
        modalTitle.textContent = title;
        modalText.textContent = text;
        redirectOnClose = redirect;
        if (isError) {
            popupModal.classList.add('error');
        } else {
            popupModal.classList.remove('error');
        }
        modalBackdrop.classList.add('open');
        popupModal.classList.add('open');
    }

    function closeModal() {
        modalBackdrop.classList.remove('open');
        popupModal.classList.remove('open');
        if (redirectOnClose) {
            location.href = '/warehouse/dashboard';
        }
    }

    closeModalBtn.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);

    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product-id');

        if (!productId) {
            openModal("Error", "No Product ID provided.", true, true);
            return;
        }

        try {
            const res = await fetch(`/api/product?id=${productId}`);
            if (!res.ok) throw new Error("Product not found");
            const product = await res.json();

            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-image').src = product.imageUrl || '/static/images/placeholder.png';
            document.getElementById('product-id').textContent = product.id; // Line Number
            document.getElementById('product-location').textContent = product.location;
            document.getElementById('current-stock').textContent = product.stockLevel;
            document.getElementById('main-content').style.display = 'block';
        } catch (e) {
            openModal("Error", "Failed to load product.", true, true);
        }

        document.getElementById('stock-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newStock = parseInt(document.getElementById('new-stock').value);

            if (isNaN(newStock) || newStock < 0) {
                 openModal("Invalid Input", "Please enter a valid, non-negative stock level.", true);
                 return;
            }

            try {
                const response = await fetch('/api/update-stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: parseInt(productId), newQuantity: newStock })
                });

                if (response.ok) {
                    openModal("Success", "Stock level updated successfully.", false, true);
                } else {
                    const errorMsg = await response.text();
                    openModal("Update Failed", errorMsg || "Failed to update stock level.", true);
                }
            } catch (err) {
                 openModal("Connection Error", "Could not connect to the server. Please try again later.", true);
            }
        });
    });
</script>
</body>
</html>
