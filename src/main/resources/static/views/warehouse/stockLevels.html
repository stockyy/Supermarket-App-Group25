<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/stockLevels.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Stock Levels</title>
</head>
<body>

    <div id="nav-placeholder"></div>
    <main>
        <div class="current-stock-container">
            <h2>Current Stock Level:</h2>
            <span>stock level insert</span>
        </div>

        <div class="next-delivery-container">
            <h2>Next Delivery</h2>
            <input type="date">
            <input type="number">
        </div>

        <div class="ammend-stock-container">
            <h2>Amend Stock Level</h2>
            <span>the stock level insert</span>
        </div>

        <button>Submit</button>
    </main>

    <script>
        fetch('/static/views/partials/managementNavBar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
                initBasket();
            })
            .catch(err => console.error('nav failed to load:', err));
    </script>

</body>
</html>
