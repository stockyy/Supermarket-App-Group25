<!doctype html>
<!--
ACADEMIC INTEGRITY DECLARATION:
The JavaScript logic within the <script> tags of this file (including DOM manipulation,
modal toggling, and asynchronous fetch requests to the backend) was primarily written
with the supportive use of generative AI (Gemini 3 pro) to assist with frontend development
because this has not been taught to me, as permitted by the COMP2850 module specification.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/stylesheets/base.css">
    <link rel="stylesheet" href="/static/stylesheets/general.css">
    <link rel="stylesheet" href="/static/stylesheets/tokens.css">
    <link rel="stylesheet" href="/static/stylesheets/partials.css">
    <link rel="stylesheet" href="/static/stylesheets/warehouse/wastage.css">
    <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Poppins:wght@400;500;600&display=swap"
          rel="stylesheet">
    <title>Wastage</title>
</head>
<body>
<div id="nav-placeholder"></div>

<main style="display: none;" id="main-content">
    <div class="left-side">
        <h2 id="product-name">Loading...</h2>
        <img id="product-img" src="" alt="Product Image">
        <div id="waste-bag-info" class="waste-bag-info" style="display: none;">
            <p>Use Bag: <span id="waste-bag-badge" class="bag-badge"></span></p>
        </div>
    </div>

    <div class="right-side">
        <form id="wastage-form" class="right-side-content">
            <div class="form-group">
                <label for="waste-reason">Waste Reason</label>
                <select id="waste-reason" name="waste-reason" required>
                    <option value="" disabled selected>Select a reason</option>
                    <option value="DAMAGED">Damaged</option>
                    <option value="EXPIRED">Expired</option>
                    <option value="POOR_PACKAGING">Poor Packaging</option>
                    <option value="DROPPED">Dropped</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter quantity" required>
            </div>

            <button type="submit" class="submit-btn">
                Submit Wastage
            </button>
        </form>
    </div>
</main>

<div class="modal-backdrop"></div>
<div class="popup-modal">
    <div class="modal-content">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-text" id="modal-text"></p>
        <button class="btn-primary close-modal-btn">OK</button>
    </div>
</div>

<script>
    fetch('/static/views/partials/managementNavBar.html')
        .then(res => res.text())
        .then(html => document.getElementById('nav-placeholder').innerHTML = html);

    const modalBackdrop = document.querySelector('.modal-backdrop');
    const popupModal = document.querySelector('.popup-modal');
    const closeModalBtn = document.querySelector('.close-modal-btn');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');

    let redirectOnClose = false;

    function openModal(title, text, isError = false, redirect = false) {
        modalTitle.textContent = title;
        modalText.textContent = text;
        redirectOnClose = redirect;
        if (isError) {
            popupModal.classList.add('error');
        } else {
            popupModal.classList.remove('error');
        }
        modalBackdrop.classList.add('open');
        popupModal.classList.add('open');
    }

    function closeModal() {
        modalBackdrop.classList.remove('open');
        popupModal.classList.remove('open');
        if (redirectOnClose) {
            location.href = '/warehouse/dashboard';
        }
    }

    closeModalBtn.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);

    document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product-id');

        if (!productId) {
            openModal("Error", "No Product ID provided.", true, true);
            return;
        }

        try {
            const res = await fetch(`/api/product?id=${productId}`);
            if (!res.ok) throw new Error("Product not found");
            const product = await res.json();

            document.getElementById('product-name').textContent = product.name;
            document.getElementById('product-img').src = product.imageUrl || '/static/images/placeholder.png';
            
            if (product.wasteBag) {
                const badge = document.getElementById('waste-bag-badge');
                badge.textContent = product.wasteBag;
                badge.className = `bag-badge bag-${product.wasteBag.toLowerCase()}`;
                document.getElementById('waste-bag-info').style.display = 'block';
            }

            document.getElementById('main-content').style.display = 'flex';
        } catch (e) {
            openModal("Error", "Failed to load product. Please check the ID.", true, true);
        }

        document.getElementById('wastage-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const reason = document.getElementById('waste-reason').value;
            const quantity = parseInt(document.getElementById('quantity').value);

            if (!reason) {
                openModal("Invalid Input", "Please select a reason for wastage.", true);
                return;
            }
            if (isNaN(quantity) || quantity <= 0) {
                openModal("Invalid Input", "Please enter a valid quantity.", true);
                return;
            }

            try {
                const response = await fetch('/api/log-wastage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId: parseInt(productId), quantity: quantity, wasteReason: reason })
                });

                if (response.ok) {
                    openModal("Success", "Wastage logged successfully.", false, true);
                } else {
                    const errorMsg = await response.text();
                    openModal("Log Failed", errorMsg || "Failed to log wastage.", true);
                }
            } catch(err) {
                openModal("Connection Error", "Could not connect to the server. Please try again later.", true);
            }
        });
    });
</script>
</body>
</html>
